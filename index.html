<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GJ Titans | Official Website</title>

  <link rel="icon" href="assets/images/logo.png" />
  <link rel="stylesheet" href="assets/css/home-single.css" />
</head>

<body>

<section class="scene" id="scene">

  <!-- Background -->
  <div class="scene-bg"></div>

  <!-- Subtle hint -->
  <div class="scene-hint">CLICK LOGO</div>

  <!-- SVG Energy Arcs -->
  <svg class="energy-arcs" viewBox="0 0 1000 1000">
    <path id="arc-squad" />
    <path id="arc-fixtures" />
    <path id="arc-gallery" />
  </svg>

  <!-- Logo -->
  <button class="logo-core" id="logoCore">
    <img src="assets/images/logo.png" alt="GJ Titans Logo">
  </button>

  <!-- Menu -->
  <div class="radial-menu">
    <button class="menu-item squad" data-target="squad">🪖<span>SQUAD</span></button>
    <button class="menu-item fixtures" data-target="fixtures">📅<span>FIXTURES</span></button>
    <button class="menu-item gallery" data-target="gallery">🖼️<span>GALLERY</span></button>
  </div>

  <!-- Overlay content -->
  <div class="content-layer" id="contentLayer"></div>

  <!-- Particles -->
  <canvas id="particles"></canvas>

</section>

<script src="assets/js/home-single.js"></script>
</body>
</html>
