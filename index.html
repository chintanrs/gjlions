<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GJ Titans | Official Website</title>

  <!-- ✅ CORRECT CSS LOAD -->
  <link rel="stylesheet" href="assets/css/home-single.css">
</head>

<body>

<section class="scene" id="scene">

  <div class="scene-bg"></div>

  <div class="scene-hint">CLICK LOGO</div>

  <!-- ✅ SVG LAYER -->
  <svg class="energy-arcs" id="energyArcs">
    <defs>
      <linearGradient id="energyGrad" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#ffd27d"/>
        <stop offset="100%" stop-color="#f5a623"/>
      </linearGradient>

      <filter id="energyGlow">
        <feGaussianBlur stdDeviation="6" result="blur"/>
        <feMerge>
          <feMergeNode in="blur"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>
    </defs>

    <path id="arc-squad"></path>
    <path id="arc-fixtures"></path>
    <path id="arc-gallery"></path>
  </svg>

  <!-- ✅ LOGO -->
  <button class="logo-core" id="logoCore">
    <img src="assets/images/logo.png" alt="GJ Titans Logo">
  </button>

  <!-- ✅ MENU -->
  <div class="radial-menu">
    <button class="menu-item" data-key="squad">🪖<span>SQUAD</span></button>
    <button class="menu-item" data-key="fixtures">📅<span>FIXTURES</span></button>
    <button class="menu-item" data-key="gallery">🖼️<span>GALLERY</span></button>
  </div>

  <div class="content-layer" id="contentLayer"></div>

</section>

<!-- ✅ CORRECT JS LOAD -->
<script src="assets/js/home-single.js"></script>
</body>
</html>
